version: 2
updates:
  # npm deps — weekly, grouped so we don't drown in PRs
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-react:
        # Next/React bumps stay grouped so they move together
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      dev-deps-safe:
        # All other dev deps — but only patch + minor bumps. Majors are
        # filtered below and opened as individual PRs (if at all), so a
        # grouped PR can never mash a patch into a major migration.
        dependency-type: development
        update-types:
          - "patch"
          - "minor"
    ignore:
      # Tailwind v4 is a ground-up rewrite (CSS-first config, @theme
      # directive, no tailwind.config.ts). Treat as a manual migration.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # TypeScript majors usually need code changes. Handle manually.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # @types/node follows Node LTS — don't auto-jump majors.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions — keep workflow actions current
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
